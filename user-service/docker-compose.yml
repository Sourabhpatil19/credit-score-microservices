services:

  mysql:
    image: mysql:8.0
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: credit_system
    ports:
      - "3307:3306"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build: .
    container_name: user-service-container
    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:mysql://mysql:3306/credit_system
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: mysupersecretkey

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - backend-network

networks:
  backend-network: